<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password | JapanOffer AI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">J</span>
      <span class="brand-copy">
        <strong>JapanOffer AI</strong>
        <small>Cross-border Talent Network</small>
      </span>
    </a>
    <div class="top-search"><span>⌕</span><input value="Search roles, talent or companies" /></div>
    <nav class="nav"><a href="jobs.html">Jobs</a><a href="talent.html">Talent</a><a href="companies.html">Companies</a></nav>
    <div class="auth-links"><a class="signin-link" href="login.html">Sign in</a><a class="nav-cta" href="signup.html">Sign up</a></div>
  </header>

  <main>
    <section class="auth-page">
      <div class="auth-copy">
        <p class="eyebrow">Reset password</p>
        <h1>Recover your account.</h1>
        <p>Enter your email and Supabase will send a reset link.</p>
      </div>

      <div class="auth-panel">
        <h2>Reset password</h2>
        <form class="auth-form" data-reset-form>
          <label>Email
            <input name="email" type="email" required placeholder="you@example.com" />
          </label>
          <button class="btn primary" type="submit">Send reset email</button>
        </form>
        <div data-auth-message class="auth-message info">We will send a reset link if the account exists.</div>
      </div>
    </section>
  </main>

  <script src="auth-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  <script src="effects.js"></script>
</body>
</html>
